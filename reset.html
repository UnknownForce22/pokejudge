<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PokéJudge – Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #f5c518;
    --gold-dim: #c9a012;
    --red: #e3350d;
    --dark: #0a0d14;
    --panel: #111520;
    --panel2: #161b2a;
    --border: rgba(245,197,24,0.18);
    --text: #e8eaf0;
    --muted: #7a8099;
    --glow: 0 0 18px rgba(245,197,24,0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(26,111,181,0.18) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(245,197,24,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(245,197,24,0.03) 40px);
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--glow);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    justify-content: center;
  }
  .pokeball-icon {
    width: 38px; height: 38px; flex-shrink: 0;
    background: conic-gradient(var(--red) 180deg, white 180deg);
    border-radius: 50%;
    position: relative;
    border: 2.5px solid #222;
    box-shadow: 0 0 14px rgba(227,53,13,0.4);
  }
  .pokeball-icon::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    width: 11px; height: 11px;
    background: white;
    border-radius: 50%;
    border: 2px solid #222;
    z-index: 2;
  }
  .pokeball-icon::after {
    content: '';
    position: absolute;
    left: 0; top: 48%; right: 0;
    height: 2.5px;
    background: #222;
  }
  .logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .page-title {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 24px;
  }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'Inter', sans-serif;
  }
  input {
    width: 100%;
    background: var(--panel2);
    border: 1px solid rgba(245,197,24,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: rgba(245,197,24,0.5); }
  input::placeholder { color: var(--muted); }
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border: none;
    border-radius: 10px;
    padding: 13px;
    color: #1a1200;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.18s;
    box-shadow: 0 2px 12px rgba(245,197,24,0.3);
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(245,197,24,0.45); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .message {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    display: none;
  }
  .message.error { background: rgba(227,53,13,0.1); border: 1px solid rgba(227,53,13,0.3); color: #ff8066; display: block; }
  .message.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; display: block; }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(26,18,0,0.3);
    border-top-color: #1a1200;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="pokeball-icon"></div>
    <h1>PokéJudge</h1>
  </div>
  <div class="page-title">Set New Password</div>

  <div id="form-reset">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="At least 6 characters" />
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="••••••••" />
    </div>
    <button class="submit-btn" id="reset-btn" onclick="handleReset()">🔐 Update Password</button>
    <div class="message" id="reset-msg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://kxmupnboemoqbxppgmgs.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-z0hTrWbdpfrtkwyzzAxkg_eHo-Wfgo';
  const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function showMsg(text, type) {
    const el = document.getElementById('reset-msg');
    el.textContent = text;
    el.className = 'message ' + type;
  }

  async function handleReset() {
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-btn');

    if (!password || !confirm) return showMsg('Please fill in all fields.', 'error');
    if (password !== confirm) return showMsg('Passwords do not match.', 'error');
    if (password.length < 6) return showMsg('Password must be at least 6 characters.', 'error');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Updating…';

    const { error } = await sbClient.auth.updateUser({ password });

    if (error) {
      showMsg(error.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '🔐 Update Password';
    } else {
      showMsg('✅ Password updated! Redirecting to login…', 'success');
      setTimeout(() => window.location.href = '/login.html', 2000);
    }
  }
</script>
</body>
</html>
